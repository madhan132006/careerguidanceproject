<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password – CareerPro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/responsive.css">
  </head>
  <body class="bg-gradient-navy d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="text-center mb-4">
            <a class="d-flex align-items-center justify-content-center gap-2 text-white fw-bold fs-3 text-decoration-none mb-2" href="/index.html">
              <i class="fa-solid fa-graduation-cap text-info"></i>
              <span>CareerPro</span>
            </a>
          </div>
          
          <div class="card p-4 shadow-lg border border-secondary">
            <h4 class="fw-bold text-dark text-center mb-3">Update Password</h4>
            <p class="text-muted text-center small mb-4">Set your new strong account password below.</p>
            
            <form id="reset-password-form">
              <div class="mb-3">
                <label for="new-pass" class="form-label text-dark fw-medium small">New Password</label>
                <input type="password" class="form-control rounded" id="new-pass" placeholder="••••••••" required>
              </div>
              
              <div class="mb-4">
                <label for="confirm-new-pass" class="form-label text-dark fw-medium small">Confirm New Password</label>
                <input type="password" class="form-control rounded" id="confirm-new-pass" placeholder="••••••••" required>
              </div>
              
              <button type="submit" class="btn btn-primary w-100 py-2.5">Reset Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.getElementById("reset-password-form")?.addEventListener("submit", (e) => {
        e.preventDefault();
        const p1 = document.getElementById("new-pass").value;
        const p2 = document.getElementById("confirm-new-pass").value;

        if (p1 !== p2) {
          alert("Passwords do not match!");
          return;
        }

        if (p1.length < 6) {
          alert("Password should be at least 6 characters.");
          return;
        }

        alert("Password reset successfully! Redirecting to login page.");
        window.location.href = "/pages/login.html";
      });
    </script>
  </body>
</html>
