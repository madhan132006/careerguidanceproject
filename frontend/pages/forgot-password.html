<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password – CareerPro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/responsive.css">
  </head>
  <body class="bg-gradient-navy d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="text-center mb-4">
            <a class="d-flex align-items-center justify-content-center gap-2 text-white fw-bold fs-3 text-decoration-none mb-2" href="/index.html">
              <i class="fa-solid fa-graduation-cap text-info"></i>
              <span>CareerPro</span>
            </a>
          </div>
          
          <div class="card p-4 shadow-lg border border-secondary">
            <h4 class="fw-bold text-dark text-center mb-3">Recover Password</h4>
            <p class="text-muted text-center small mb-4">Enter your registered email below, and we will dispatch a password recovery link to your inbox.</p>
            
            <form id="forgot-password-form">
              <div class="mb-4">
                <label for="recovery-email" class="form-label text-dark fw-medium small">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-envelope"></i></span>
                  <input type="email" class="form-control rounded-end" id="recovery-email" placeholder="name@example.com" required>
                </div>
              </div>
              
              <button type="submit" class="btn btn-primary w-100 py-2.5">Send Reset Link</button>
            </form>
            
            <div class="text-center mt-4">
              <p class="text-muted small mb-0"><a href="/pages/login.html" class="fw-bold text-decoration-none"><i class="fa-solid fa-arrow-left me-2"></i>Back to Sign In</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.getElementById("forgot-password-form")?.addEventListener("submit", (e) => {
        e.preventDefault();
        alert("A recovery link has been sent to your email. Click OK to proceed to password reset simulation.");
        window.location.href = "/pages/reset-password.html";
      });
    </script>
  </body>
</html>
