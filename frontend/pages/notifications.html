<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications Inbox – CareerPro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/responsive.css">
  </head>
  <body>

    <div class="app-container">
      <!-- Dynamic Sidebar Container -->
      <div id="sidebar-container"></div>

      <!-- Main Content Area -->
      <div class="main-wrapper">
        <!-- Dynamic Top Navbar Container -->
        <div id="topbar-container"></div>

        <!-- Page Content -->
        <main class="page-content fade-in">
          
          <div class="row mb-4">
            <div class="col-12 d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
              <div>
                <h2 class="dashboard-title"><i class="fa-solid fa-bell text-primary me-2"></i>Notifications Inbox</h2>
                <p class="text-muted small">Stay updated on upcoming technical exams, milestones accomplishments, and candidate matches.</p>
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-outline-primary" id="btn-mark-all-read"><i class="fa-solid fa-envelope-open me-2"></i>Mark All Read</button>
                <button class="btn btn-outline-danger" id="btn-clear-notifications"><i class="fa-solid fa-trash-can me-2"></i>Clear All Log</button>
              </div>
            </div>
          </div>

          <!-- Dynamic Notifications lists container -->
          <div id="notifications-log-list">
            <!-- Loaded dynamically by notification.js -->
            <div class="text-center p-5 bg-white border rounded">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading Alerts Inbox...</span>
              </div>
            </div>
          </div>

        </main>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container"></div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/notification.js"></script>
  </body>
</html>
